plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Load keystore properties from external file
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
def useReleaseKeys = false
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    // Only set to true if both the file exists and the keystore file actually exists
    def keystoreFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
    useReleaseKeys = keystoreFile != null && keystoreFile.exists()
}

// Load dApp Store keystore properties from external file (separate signing key required)
def dappStoreKeystorePropertiesFile = rootProject.file("dappstore-keystore.properties")
def dappStoreKeystoreProperties = new Properties()
def useDappStoreKeys = false
if (dappStoreKeystorePropertiesFile.exists()) {
    dappStoreKeystoreProperties.load(new FileInputStream(dappStoreKeystorePropertiesFile))
    def dappStoreKeystoreFile = dappStoreKeystoreProperties['storeFile'] ? file(dappStoreKeystoreProperties['storeFile']) : null
    useDappStoreKeys = dappStoreKeystoreFile != null && dappStoreKeystoreFile.exists()
}

// Read APP_FLAVOR from environment to set a unique applicationId per flavor.
// This allows all flavor APKs to be installed side-by-side on the same device.
// Defaults to 'agixt' for local development when the env var is not set.
def appFlavor = System.getenv('APP_FLAVOR') ?: 'agixt'
def appDisplayName = System.getenv('APP_NAME') ?: 'AGiXT'

android {
    namespace = "dev.agixt.agixt"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "27.0.11902837"

    // Add signing configs for release builds
    signingConfigs {
        debug {
            // Use debug keys by default
        }
        release {
            // Only apply release signing config if keystore file exists
            if (useReleaseKeys) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
        dappStore {
            // Separate signing config for Solana dApp Store (must differ from Google Play)
            if (useDappStoreKeys) {
                keyAlias dappStoreKeystoreProperties['keyAlias']
                keyPassword dappStoreKeystoreProperties['keyPassword']
                storeFile file(dappStoreKeystoreProperties['storeFile'])
                storePassword dappStoreKeystoreProperties['storePassword']
            }
        }
    }
  
    compileOptions {
        // Flag to enable support for the new language APIs
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    externalNativeBuild {
        cmake {
            path = file("src/main/cpp/CMakeLists.txt")
            version = "3.22.1"
        }
    }

    defaultConfig {
        applicationId = "dev.agixt.${appFlavor}"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 24 // minimum SDK version for speech_to_text
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled true
        ndk {
            abiFilters  'armeabi-v7a', 'arm64-v8a'
        }
        
        // Inject display name as a string resource so AndroidManifest can reference it
        resValue "string", "app_name", appDisplayName

        // Add the required manifest placeholders
        manifestPlaceholders = [
            'appAuthRedirectScheme': appFlavor,
            'applicationName': 'io.flutter.app.FlutterApplication'
        ]
    }

    buildTypes {
        release {
            // Only use release signing config if keystore exists, otherwise use debug signing
            signingConfig useReleaseKeys ? signingConfigs.release : signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            minifyEnabled true
            shrinkResources true
        }
        dappStoreRelease {
            // dApp Store build: uses separate signing key, outputs APK
            initWith release
            signingConfig useDappStoreKeys ? signingConfigs.dappStore : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
  coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:1.2.2'
  // FFmpeg dependencies have been removed as we now use native speech recognition
  
  // Wearable Data Layer API for Pixel Watch / Wear OS connectivity
  implementation 'com.google.android.gms:play-services-wearable:18.1.0'
  
  // Kotlin coroutines for async operations
  implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
  implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.7.3'
}

subprojects {
    afterEvaluate { project ->
        if (project.plugins.hasPlugin("com.android.application") ||
                project.plugins.hasPlugin("com.android.library")) {
            project.android {
                compileSdkVersion 35                
            }
        }
    }
}
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(':app')
}
